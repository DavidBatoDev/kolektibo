# Supabase local/project config (subset — the CLI may add more keys on `supabase start`).
# Reflects Kolektibo's auth: email + password (email confirmation) + Google + anonymous.
project_id = "kolektibo"

[auth]
enable_signup = true
enable_anonymous_sign_ins = true          # "browse a pool before signing up" → link later
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "http://localhost:5173/**", "http://localhost:8787"]
jwt_expiry = 3600                          # short TTL; rely on refresh rotation
password_min_length = 8

[auth.email]
enable_signup = true
enable_confirmations = false               # native confirmation OFF; we verify via our own
                                           # profiles.is_email_verified + backend 6-digit codes

# Transactional email via Gmail SMTP (app password). Secrets come from the environment.
[auth.email.smtp]
enabled = true
host = "smtp.gmail.com"
port = 465
user = "env(GMAIL_USER)"
pass = "env(GMAIL_APP_PASSWORD)"
admin_email = "env(GMAIL_USER)"
sender_name = "Kolektibo"

# Google OAuth — secrets come from the environment, never committed.
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_SECRET)"

[db]
port = 54322

[api]
port = 54321
schemas = ["public"]

[storage]
enabled = true
# `avatars` (public) bucket + owner-folder policies are created in migration 0003.
# `receipts` (private, signed URLs) follows in a later migration.
