<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="k-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#15803D"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#k-bg)"/>
  <!-- stacked pooled coins -->
  <ellipse cx="32" cy="44" rx="15" ry="5.5" fill="#0b1220" opacity="0.25"/>
  <ellipse cx="32" cy="40" rx="15" ry="5.5" fill="#fbbf24"/>
  <ellipse cx="32" cy="33" rx="15" ry="5.5" fill="#fcd34d"/>
  <ellipse cx="32" cy="26" rx="15" ry="5.5" fill="#fde68a"/>
  <!-- peso mark on the top coin -->
  <text x="32" y="30" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="800" fill="#15803D">₱</text>
</svg>
