name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type-check the backend
        run: pnpm --filter @kolektibo/ai exec tsc --noEmit
      - name: Build the PWA
        run: pnpm build
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run deterministic browser checks
        env:
          CI: '1'
          PLAYWRIGHT_SLOW_MO: '0'
        run: pnpm exec playwright test tests/e2e/home.spec.ts --project=chromium
